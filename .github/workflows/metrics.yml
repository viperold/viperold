name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # CONFIGURACIÓN BÁSICA (classic es la correcta, con tema dark)
          template: classic
          base: header, metadata # Requerido para ver "LINES OF CODE" y "FILES"
          config_theme: dark
          config_timezone: America/Santiago # Tu zona horaria

          # COLORES PARA REPLICAR TU IMAGEN (borde rojo, títulos rojos, valores cyan)
          # Esto ajusta la paleta exacto al ejemplo
          config_colors: '{"title":"#FF0000","text":"#00FFFF","icon":"#FF0000","border":"#FF0000","field_name":"#00FFFF","label":"#00FFFF"}'
          
          # PLUGIN 1: Líneas de Código
          plugin_lines: yes
          
          # PLUGIN 2: Lenguajes más usados
          plugin_languages: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
