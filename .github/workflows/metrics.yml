name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # ¡Aquí está la magia! Cambiamos a la plantilla terminal
          template: terminal
          base: "" 
          
          # Plugins (Tus líneas de código y lenguajes)
          plugin_lines: yes
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
